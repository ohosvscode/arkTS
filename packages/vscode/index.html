<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <div id="global-loading">
    <div class="global-loading-spinner"></div>
    <div class="global-loading-text">Loading...</div>
  </div>
  <style>
    #global-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 9999;
      background-color: var(--vscode-editor-background);
    }
    #global-loading .global-loading-spinner {
      width: 2.5rem;
      height: 2.5rem;
      border: 4px solid var(--vscode-input-background);
      border-top-color: var(--vscode-foreground);
      border-radius: 9999px;
      animation: global-loading-spin 1s linear infinite;
    }
    @keyframes global-loading-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    #global-loading .global-loading-text {
      font-size: 0.875rem;
      line-height: 1.25rem;
      color: var(--vscode-foreground);
      pointer-events: none;
      user-select: none;
    }
  </style>
  <div id="app"></div>
  <script src="./src/frontend/main.ts" type="module"></script>
</body>
</html>
