name: CI & Release

on:
  push:
    branches:
      - next

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  lint:
    name: Lint (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x, 24.x]
      fail-fast: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0
          run_install: |
            - args: ['--force']

      - name: Run Lint
        run: pnpm run lint

  pack:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-26-intel
            pack: pnpm -F vscode-naily-ets run pack --target darwin-x64
            env:
              OS: darwin
              ARCH: x64
          - host: macos-latest
            pack: pnpm -F vscode-naily-ets run pack --target darwin-arm64
            env:
              OS: darwin
              ARCH: arm64
          - host: ubuntu-latest
            pack: pnpm -F vscode-naily-ets run pack --target linux-x64
            env:
              OS: linux
              ARCH: x64
          - host: ubuntu-24.04-arm
            pack: pnpm -F vscode-naily-ets run pack --target linux-arm64
            env:
              OS: linux
              ARCH: arm64
          - host: ubuntu-latest
            pack: pnpm -F vscode-naily-ets run pack --target alpine-x64
            env:
              OS: linux
              ARCH: x64
              LIBC: musl
          - host: ubuntu-24.04-arm
            pack: pnpm -F vscode-naily-ets run pack --target alpine-arm64
            env:
              OS: linux
              ARCH: arm64
              LIBC: musl
          - host: ubuntu-latest
            pack: pnpm -F vscode-naily-ets run pack --target linux-armhf
            env:
              OS: linux
              CPU: arm
          - host: windows-latest
            pack: pnpm -F vscode-naily-ets run pack --target win32-x64
            env:
              OS: win32
              ARCH: x64
          - host: windows-11-arm
            pack: pnpm -F vscode-naily-ets run pack --target win32-arm64
            env:
              OS: win32
              ARCH: arm64
          - host: macos-latest
            pack: pnpm -F vscode-naily-ets run pack --target web
            env:
              CPU: wasm32
    name: ${{ matrix.settings.env.CPU == 'wasm32' && 'Package Extension - web' || format('Package Extension - {0} - {1} - {2}', matrix.settings.env.OS, matrix.settings.env.ARCH, matrix.settings.env.OS == 'win32' && 'msvc' || (matrix.settings.env.LIBC || 'glibc')) }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.33.0
          run_install: true

      - name: Run Pack
        run: ${{ matrix.settings.pack }}
        env:
          OS: ${{ matrix.settings.env.OS }}
          ARCH: ${{ matrix.settings.env.ARCH }}
          LIBC: ${{ matrix.settings.env.OS == 'win32' && 'msvc' || matrix.settings.env.CPU == 'wasm32' && '' || matrix.settings.env.LIBC || 'glibc' }}
          CPU: ${{ matrix.settings.env.CPU }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.settings.env.CPU == 'wasm32' && 'vscode-naily-ets-web' || format('vscode-naily-ets-{0}-{1}-{2}', matrix.settings.env.OS, matrix.settings.env.ARCH, matrix.settings.env.OS == 'win32' && 'msvc' || (matrix.settings.env.LIBC || 'glibc')) }}
          path: packages/vscode/vscode-naily-ets-*.vsix

  release:
    name: Create Release Pull Request or Release
    runs-on: ubuntu-latest
    needs: [lint, pack]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0
          run_install: true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: packages/vscode

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find packages/vscode -type f -name "*.vsix"

      - name: Copy vsix files to extension source root
        run: |
          find packages/vscode -type f -name '*.vsix' -print0 |
          while IFS= read -r -d '' f; do
            cp "$f" "packages/vscode/$(basename "$f")"
          done
          find packages/vscode -maxdepth 1 -type f -name '*.vsix'

      - name: Create Release Pull Request or Release
        id: changesets
        uses: changesets/action@v1
        with:
          commit: 'chore(release): release packages'
          title: 'chore(release): release packages'
          publish: pnpm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload VSIX assets to GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "vscode-naily-ets") | "\(.name)@\(.version)"' | head -n 1)
          if [ -z "$tag" ]; then
            echo "No vscode-naily-ets package found in published packages; skip upload."
            exit 0
          fi
          echo "Uploading VSIX assets to release: $tag"
          gh release upload "$tag" packages/vscode/*.vsix --clobber
